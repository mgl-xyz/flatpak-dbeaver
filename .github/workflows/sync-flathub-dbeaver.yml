name: Sync DBeaver Flathub and Publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write

concurrency:
  group: sync-dbeaver-flathub
  cancel-in-progress: false

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync content from flathub/io.dbeaver.DBeaverCommunity
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          git clone --depth=1 https://github.com/flathub/io.dbeaver.DBeaverCommunity.git "$tmp_dir"

          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            "$tmp_dir/" ./

          rm -rf "$tmp_dir"

      - name: Commit and push when changed
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "chore(sync): update from flathub/io.dbeaver.DBeaverCommunity"
          git push

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sync-${{ github.run_number }}
          name: DBeaver Flathub Sync #${{ github.run_number }}
          generate_release_notes: true
